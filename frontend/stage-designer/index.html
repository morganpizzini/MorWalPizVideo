<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>IPSC Stage Designer</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Top Toolbar -->
    <div class="toolbar">
        <div class="toolbar-section">
            <button class="tool-btn active" data-tool="select" title="Select/Move">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="draw" title="Draw Freehand">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="line" title="Draw Straight Lines">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 3h2v2H3V3m4 0h2v2H7V3m4 0h2v2h-2V3m4 0h2v2h-2V3m4 0h2v2h-2V3M3 7h2v2H3V7m4 0h2v2H7V7m4 0h2v2h-2V7m4 0h2v2h-2V7m4 0h2v2h-2V7m-8 4h2v2h-2v-2m-4 0h2v2H7v-2m-4 0h2v2H3v-2m8 0h2v2h-2v-2m4 0h2v2h-2v-2m4 0h2v2h-2v-2M3 15h2v2H3v-2m4 0h2v2H7v-2m4 0h2v2h-2v-2m4 0h2v2h-2v-2m4 0h2v2h-2v-2M3 19h2v2H3v-2m4 0h2v2H7v-2m4 0h2v2h-2v-2m4 0h2v2h-2v-2m4 0h2v2h-2v-2z"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="fill" title="Fill Area">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15c-.59.59-.59 1.54 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10L10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="eraser" title="Eraser">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.008 4.008 0 0 1-5.66 0L2.81 17c-.78-.79-.78-2.05 0-2.84l10.6-10.6c.79-.78 2.05-.78 2.83 0M4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.53-6.36-6.36-3.54 3.53Z"/>
                </svg>
            </button>
            <button class="tool-btn" data-tool="ruler" title="Measure Distance">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 10H3V8h2v4h2V8h2v4h2V8h2v4h2V8h2v4h2V8h2v8z"/>
                </svg>
            </button>
        </div>
        
        <div class="toolbar-section">
            <div class="color-picker-container">
                <input type="color" id="colorPicker" value="#000000" title="Line Color">
                <input type="color" id="fillColorPicker" value="#ffff00" title="Fill Color">
            </div>
            <input type="range" id="lineWidth" min="1" max="10" value="2" title="Line Width">
        </div>

        <div class="toolbar-section">
            <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
                </svg>
            </button>
            <button class="tool-btn" id="gridToggle" title="Toggle Grid">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 20H4v-4h4v4zm0-6H4v-4h4v4zm0-6H4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4z"/>
                </svg>
            </button>
            <button class="tool-btn" id="snapToggle" title="Snap to Grid">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Object Library Sidebar -->
    <div class="sidebar" id="objectLibrary">
        <div class="sidebar-header">
            <h3>Objects</h3>
            <button class="close-btn" id="closeSidebar">&times;</button>
        </div>
        <div class="object-list">
            <div class="object-item" draggable="true" data-object="pepper">
                <div class="object-preview pepper-preview"></div>
                <span>Pepper</span>
            </div>
            <div class="object-item" draggable="true" data-object="plate">
                <div class="object-preview plate-preview"></div>
                <span>Plate</span>
            </div>
            <div class="object-item" draggable="true" data-object="target">
                <div class="object-preview target-preview"></div>
                <span>Target</span>
            </div>
            <div class="object-item" draggable="true" data-object="halfTarget">
                <div class="object-preview target-preview" style="transform: scale(0.7);"></div>
                <span>Half Target</span>
            </div>
            <div class="object-item" draggable="true" data-object="miniTarget">
                <div class="object-preview target-preview" style="transform: scale(0.5);"></div>
                <span>Mini Target</span>
            </div>
            <div class="object-item" draggable="true" data-object="noShootTarget">
                <div class="object-preview target-preview" style="background-color: #e8e8e8;"></div>
                <span>No Shoot Target</span>
            </div>
            <div class="object-item" draggable="true" data-object="noShootPepper">
                <div class="object-preview pepper-preview" style="background-color: #e8e8e8;"></div>
                <span>No Shoot Popper</span>
            </div>
            <div class="object-item" draggable="true" data-object="noShootPlate">
                <div class="object-preview plate-preview" style="background-color: #e8e8e8;"></div>
                <span>No Shoot Plate</span>
            </div>
            <div class="object-item" draggable="true" data-object="barricade">
                <div class="object-preview barricade-preview"></div>
                <span>Barricade</span>
            </div>
        </div>
    </div>

    <!-- Main Canvas Area -->
    <div class="canvas-container">
        <button class="fab" id="objectLibraryBtn" title="Object Library">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>
            </svg>
        </button>
        
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomIn">+</button>
            <button class="zoom-btn" id="zoomReset">100%</button>
            <button class="zoom-btn" id="zoomOut">−</button>
        </div>

        <div class="scale-display" id="scaleDisplay">Scale: 1:50 (1px = 0.1m)</div>
        
        <canvas id="mainCanvas"></canvas>
    </div>

    <!-- Bottom Panel -->
    <div class="bottom-panel" id="bottomPanel">
        <div class="panel-header">
            <button class="toggle-btn" id="togglePanel">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                </svg>
            </button>
            <div class="stage-tabs" id="stageTabs"></div>
            <button class="add-stage-btn" id="addStage">+ Stage</button>
        </div>
        
        <div class="panel-content" id="panelContent">
            <div class="stage-info-header">
                <h4>Stage Information</h4>
                <button class="collapse-info-btn" id="collapseInfoBtn" title="Collapse/Expand">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                    </svg>
                </button>
            </div>
            <div class="stage-info" id="stageInfo">
                <div class="form-group">
                    <label for="stageName">Stage Name:</label>
                    <input type="text" id="stageName" placeholder="Enter stage name">
                </div>
                <div class="form-group">
                    <label for="stageNotes">Notes:</label>
                    <textarea id="stageNotes" placeholder="Add notes (round count, time limits, etc.)"></textarea>
                </div>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn" id="exportJson">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/>
                    </svg>
                    Export JSON
                </button>
                <button class="action-btn" id="importJson">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6-.67l2.59 2.58L17 12.5l-5-5-5 5 1.41 1.41L11 11.33V21h2v-9.67z"/>
                    </svg>
                    Import JSON
                </button>
                <button class="action-btn" id="exportImage">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                    </svg>
                    Export Image
                </button>
                <button class="action-btn danger" id="deleteStage">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                    Delete Stage
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <script src="index.js"></script>
</body>
</html>
