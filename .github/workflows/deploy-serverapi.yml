name: Deploy ServerAPI

on:
  push:
    branches:
      - main
    paths:
      - 'MorWalPizVideo.ServerAPI/**'
      - 'MorWalPizVideo.Domain/**'
      - 'MorWalPizVideo.Models/**'
      - 'MorWalPizVideo.MvcHelpers/**'
      - 'MorWalPizVideo.ServiceDefaults/**'
      - 'MorWalPiz.Contracts/**'
      - '.github/workflows/deploy-serverapi.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to Azure
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore MorWalPizVideo.ServerAPI/MorWalPizVideo.ServerAPI.csproj

      - name: Build
        run: dotnet build MorWalPizVideo.ServerAPI/MorWalPizVideo.ServerAPI.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish MorWalPizVideo.ServerAPI/MorWalPizVideo.ServerAPI.csproj --configuration Release --no-build --output ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.SERVERAPI_APP_NAME }}
          package: ./publish

      - name: Azure logout
        if: always()
        run: az logout