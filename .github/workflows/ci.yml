name: CI - Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build-frontend:
    name: Build Frontend Applications
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        app: [back-office-spa, morwalpizvideo.client]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build shared packages
        working-directory: frontend
        run: yarn build:models

      - name: Build ${{ matrix.app }}
        working-directory: frontend
        run: yarn workspace ${{ matrix.app }} build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: frontend/${{ matrix.app }}/dist
          retention-days: 1

  build-backend:
    name: Build Backend Applications
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        project:
          - name: BackOffice
            path: MorWalPizVideo.BackOffice
          - name: ServerAPI
            path: MorWalPizVideo.ServerAPI
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.project.path }}/${{ matrix.project.path }}.csproj

      - name: Build
        run: dotnet build ${{ matrix.project.path }}/${{ matrix.project.path }}.csproj --configuration Release --no-restore

      - name: Test
        run: |
          if [ -d "tests" ]; then
            dotnet test --configuration Release --no-build --verbosity normal
          else
            echo "No tests found, skipping test step"
          fi